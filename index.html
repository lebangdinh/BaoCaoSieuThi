function getStoreAggregates(){let stores=[...new Set(DATA.employees.map(e=>e.store))];return stores.map(store=>{let emps=DATA.employees.filter(e=>e.store===store);let subjNames=[...new Set(emps.flatMap(e=>e.subjects.map(s=>s.item)))];let subjects=subjNames.map(name=>{let list=emps.map(e=>e.subjects.find(s=>norm(s.item)===norm(name))).filter(Boolean);let actual=list.reduce((a,s)=>a+s.actual,0);let target=list.reduce((a,s)=>a+s.targetNV,0);let pct=target?actual/target*100:0;let chain=list[0]?.chain||emps[0]?.chain||'';let forecast=list[0]?.forecast||0;let perDay=list[0]?.perDay||0;return {item:name,actual,target,pct,forecast,perDay}}).filter(x=>x.target>0);let done=subjects.filter(s=>s.pct>=100).length;let over80=subjects.filter(s=>s.pct>=80).length;let low50=subjects.filter(s=>s.pct<50).length;let rate=subjects.length?done/subjects.length*100:0;let avg=subjects.length?subjects.reduce((a,s)=>a+s.pct,0)/subjects.length:0;let strongest=subjects.slice().sort((a,b)=>b.pct-a.pct)[0];let weakest=subjects.slice().sort((a,b)=>a.pct-b.pct)[0];let avgEmp=emps.length?emps.reduce((a,e)=>a+e.total,0)/emps.length:0;let chain=emps[0]?.chain||'';return {store,chain,emps,subjects,done,over80,low50,rate,avg,strongest,weakest,avgEmp}}).sort((a,b)=>b.rate-a.rate||b.avg-a.avg)}

function projectPct(currentPct){let d=dayInfo();let dp=Math.max(0.01,d.d/d.total);return currentPct/dp}

function rebuild(){
 let r=raw(); let people=parsePeople(r.nhansu), kpiTZ=parseKPI(r.kpiTZ,'Topzone'), kpiTGDD=parseKPI(r.kpiTGDD,'TGDĐ'), stores=parseStores(r.store);
 DATA={raw:r,people,kpiTZ,kpiTGDD,stores};
 let thi={Topzone:parseThi(r.thiTZ,people),'TGDĐ':parseThi(r.thiTGDD,people)}; let dt={Topzone:parseDT(r.dtTZ,people),'TGDĐ':parseDT(r.dtTGDD,people)}; let kpi={Topzone:kpiTZ,'TGDĐ':kpiTGDD};
 let count={}; people.forEach(p=>count[p.store]=(count[p.store]||0)+1); DATA.count=count;
 let employees=people.map(p=>{
  let d=(dt[p.chain]||{})[p.id]||{dtlk:0,dtqd:0,eff:0,qty:0,price:0}; let c=count[p.store]||1; let targetDT=storeTarget(p.store,p.chain)/c;
  let dtPct=targetDT?d.dtqd/targetDT*100:0; let dtForecast=projectPct(dtPct);
  let empMap=(thi[p.chain]?.emps||{})[p.id]||{};
  let subjects=(kpi[p.chain]||[]).map(k=>{let rec=matchSubject(empMap,k.item); let actual=rec?rec.value:0; let targetNV=k.target/c*1.3; let empHT=targetNV?actual/targetNV*100:0; let forecastEmp=projectPct(empHT); return {...k,actual,targetNV,unit:rec?.unit||'',empHT,forecastEmp,rank:0,gapNV:Math.max(0,targetNV-actual)}}).filter(s=>s.targetNV>0);
  let achievedNow=subjects.filter(s=>s.empHT>=100).length; let achievedProjected=subjects.filter(s=>s.forecastEmp>=100).length; let effPct=subjects.length?achievedProjected/subjects.length*100:0;
  let total=dtForecast*.5+effPct*.5; let weak=subjects.slice().sort((a,b)=>a.forecastEmp-b.forecastEmp).slice(0,3); let strong=subjects.slice().sort((a,b)=>b.forecastEmp-a.forecastEmp).slice(0,3);
  return {...p,dt:d,targetDT,dtPct,dtForecast,subjects,achievedNow,achievedProjected,achieved:achievedProjected,effPct,total,weak,strong};
 });
 employees.forEach(e=>e.subjects.forEach(s=>{let group=employees.filter(x=>x.store===e.store).map(x=>({e:x,s:x.subjects.find(y=>norm(y.item)===norm(s.item))})).filter(x=>x.s).sort((a,b)=>b.s.forecastEmp-a.s.forecastEmp); s.rank=group.findIndex(x=>x.e.id===e.id)+1}));
 employees.sort((a,b)=>b.total-a.total).forEach((e,i)=>e.rank=i+1); DATA.employees=employees; if(!STATE.activeDetail&&employees[0])STATE.activeDetail=employees[0].id;
}

function getStoreAggregates(){let emps=employeesScoped();let grouped={};emps.forEach(e=>(grouped[e.store]=grouped[e.store]||[]).push(e));return Object.entries(grouped).map(([store,emps])=>{let chain=emps[0]?.chain||'';let subjects=[...new Set(emps.flatMap(e=>e.subjects.map(s=>s.item)))].map(item=>{let list=emps.flatMap(e=>e.subjects.filter(s=>norm(s.item)===norm(item)));let actual=list.reduce((a,s)=>a+s.actual,0);let target=list.reduce((a,s)=>a+s.targetNV,0);let pct=target?actual/target*100:0;let forecast=projectPct(pct);return {item,actual,target,pct,forecast}}).filter(s=>s.target>0);let done=subjects.filter(s=>s.forecast>=100).length;let over80=subjects.filter(s=>s.forecast>=80).length;let low50=subjects.filter(s=>s.forecast<50).length;let rate=subjects.length?done/subjects.length*100:0;let avg=subjects.length?subjects.reduce((a,s)=>a+s.forecast,0)/subjects.length:0;let strongest=subjects.slice().sort((a,b)=>b.forecast-a.forecast)[0];let weakest=subjects.slice().sort((a,b)=>a.forecast-b.forecast)[0];let avgEmp=emps.length?emps.reduce((a,e)=>a+e.total,0)/emps.length:0;return {store,chain,emps,subjects,done,over80,low50,rate,avg,strongest,weakest,avgEmp}}).sort((a,b)=>b.rate-a.rate||b.avg-a.avg)}

function renderStoreComp(){let agg=getStoreAggregates();let totalSubjects=agg.reduce((a,s)=>a+s.subjects.length,0)||1;let totalDone=agg.reduce((a,s)=>a+s.done,0);let avgRate=agg.length?agg.reduce((a,s)=>a+s.rate,0)/agg.length:0;let storeOver50=agg.filter(s=>s.rate>=50).length;let storeUnder20=agg.filter(s=>s.rate<20).length;let allSubjects=[...new Set(agg.flatMap(s=>s.subjects.map(x=>x.item)))];let systemRows=allSubjects.map(item=>{let cells=agg.map(st=>st.subjects.find(s=>norm(s.item)===norm(item)));let vals=cells.filter(Boolean).map(x=>x.forecast);let avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;return {item,cells,avg}}).sort((a,b)=>b.avg-a.avg);let best=agg[0];let need=agg.slice().sort((a,b)=>a.rate-b.rate)[0];let weakSubject=systemRows.slice().sort((a,b)=>a.avg-b.avg)[0];let rankRows=agg.map((s,i)=>`<tr><td class="rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td><td><span class="store-name-short">${shortStoreName(s.store)}</span><br><small class="muted">${s.store}</small></td><td class="num">${s.emps.length}</td><td class="num ${cls(s.rate)}"><b>${p(s.rate)}</b><br>${bar(s.rate)}</td><td class="num"><b>${s.done}/${s.subjects.length}</b></td><td>${s.strongest?`<b>${s.strongest.item}</b><br><span class="green">${p(s.strongest.forecast)}</span>`:'-'}</td><td>${s.weakest?`<b>${s.weakest.item}</b><br><span class="red">${p(s.weakest.forecast)}</span>`:'-'}</td><td class="num"><b>${f(s.avgEmp,1)}</b></td></tr>`).join('');let heatHead=agg.map(s=>`<th class="num">${shortStoreName(s.store)}</th>`).join('');let heatRows=systemRows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${r.item}</b></td>${r.cells.map(c=>c?`<td class="hm-cell ${hmClass(c.forecast)}">${p(c.forecast)}</td>`:`<td class="hm-cell hm-none">-</td>`).join('')}<td class="hm-cell ${hmClass(r.avg)}">${p(r.avg)}</td></tr>`).join('');document.getElementById('storeComp').innerHTML=`<div class="store-hero"><div class="main-kpi"><div class="target-icon">◎</div><div><small>Thi đua theo siêu thị • ${scopeText()}</small><b>Dự kiến về ${totalDone}/${totalSubjects} môn</b><span class="muted">Mỗi siêu thị dùng đúng bộ môn/target riêng</span></div></div><div><small>Tỷ lệ hoàn thành TB</small><b>${f(avgRate,1)}%</b></div><div><small>Siêu thị ≥ 50%</small><b>${storeOver50}/${agg.length}</b></div><div><small>Siêu thị dưới 20%</small><b>${storeUnder20}/${agg.length}</b></div><div class="ring" style="--v:${Math.min(100,totalDone/totalSubjects*100)}%"><span>${totalDone}/${totalSubjects}</span></div></div><div class="card pad" style="margin-top:14px"><h2>📊 Xếp hạng siêu thị theo môn đạt dự kiến</h2><div class="table-wrap"><table><thead><tr><th>Hạng</th><th>Siêu thị</th><th class="num">Tổng NV</th><th class="num">Tỷ lệ môn đạt dự kiến</th><th class="num">Dự kiến về</th><th>Môn mạnh nhất</th><th>Môn yếu nhất</th><th class="num">Điểm TB NV</th></tr></thead><tbody>${rankRows}</tbody></table></div></div><div class="store-insights"><div class="card pad"><h2>🔥 Heatmap % dự kiến từng môn theo siêu thị</h2><div class="table-wrap"><table><thead><tr><th>STT</th><th>Môn thi đua</th>${heatHead}<th class="num">TB toàn hệ thống</th></tr></thead><tbody>${heatRows}</tbody></table></div><div class="tbl-note">Xanh ≥100%, Cam 50–99%, Đỏ &lt;50%, dấu “-” là siêu thị không có target/môn đó.</div></div><div class="card pad"><h2>🤖 Tổng quan nhanh</h2><div class="quick-card"><small class="muted">Siêu thị dẫn đầu</small><b class="green">${best?shortStoreName(best.store):'-'}</b><span>${best?`${f(best.rate,1)}% • ${best.done}/${best.subjects.length} môn`:''}</span></div><div class="quick-card"><small class="muted">Siêu thị cần cải thiện</small><b class="red">${need?shortStoreName(need.store):'-'}</b><span>${need?`${f(need.rate,1)}% • yếu nhất: ${need.weakest?.item||'-'}`:''}</span></div><div class="quick-card"><small class="muted">Môn yếu nhất toàn hệ thống</small><b class="red">${weakSubject?weakSubject.item:'-'}</b><span>${weakSubject?p(weakSubject.avg):''}</span></div></div></div>`}

function hashPin(pin){
  let h=2166136261;
  for(let i=0;i<String(pin||'').length;i++){h^=String(pin).charCodeAt(i); h=Math.imul(h,16777619)>>>0;}
  return h>>>0;
}

function ensureMonth(db,month){db.months=db.months||{}; if(!db.months[month]) db.months[month]={current:null,snapshots:{},createdAt:new Date().toISOString(),updatedAt:null}; return db.months[month]}
function oldRawFallback(){try{return JSON.parse(localStorage.getItem('td_v5_fixed'))||{...DEFAULT}}catch(e){return {...DEFAULT}}}

raw=function(){let db=getDB(), month=getMonthKey(); let m=ensureMonth(db,month); if(!m.current){m.current=oldRawFallback(); m.updatedAt=new Date().toISOString(); setDB(db)} return m.current||{...DEFAULT}}
saveRaw=function(o){let db=getDB(), month=getMonthKey(); let m=ensureMonth(db,month); m.current=o; m.updatedAt=new Date().toISOString(); setDB(db); localStorage.setItem('td_v5_fixed',JSON.stringify(o))}
function currentSummaryFromData(){

  return {month:getMonthKey(), day:day.d, savedAt:new Date().toISOString(), employees:(DATA.employees||[]).map(e=>({
    id:e.id,name:e.name,chain:e.chain,store:e.store,dtqd:e.dt?.dtqd||0,dtlk:e.dt?.dtlk||0,effPct:e.effPct||0,dtForecast:e.dtForecast??e.dtPct??0,total:e.total||0,achievedProjected:e.achievedProjected??e.achieved??0,subjects:(e.subjects||[]).map(s=>({item:s.item,actual:s.actual||0,targetNV:s.targetNV||0,empHT:s.empHT||0,forecastEmp:s.forecastEmp??s.empHT??0,rank:s.rank||0}))
  })), stores:(DATA.stores||[]) }
}

function monthShift(month,delta){let [y,m]=month.split('-').map(Number); m+=delta; while(m<1){m+=12;y--} while(m>12){m-=12;y++} return `${y}-${String(m).padStart(2,'0')}`}
function bestSnapshot(month,day){let db=getDB(), m=db.months?.[month]; if(!m||!m.snapshots)return null; let keys=Object.keys(m.snapshots).map(Number).filter(x=>x<=day).sort((a,b)=>b-a); if(!keys.length)return null; return m.snapshots[String(keys[0]).padStart(2,'0')]}
function snapshotByExact(month,day){let db=getDB(), m=db.months?.[month]; return m?.snapshots?.[String(day).padStart(2,'0')]||null}
function compareRows(base,prevMonthSnap,yesterdaySnap){
  let pMap=new Map((prevMonthSnap?.employees||[]).map(e=>[e.id,e]));
  let yMap=new Map((yesterdaySnap?.employees||[]).map(e=>[e.id,e]));
  return (base.employees||[]).map(e=>{let pm=pMap.get(e.id), yd=yMap.get(e.id); return {e,pm,yd,dtDelta:pm?e.dtqd-pm.dtqd:null,dtDeltaPct:pm&&pm.dtqd?((e.dtqd-pm.dtqd)/pm.dtqd*100):null,effDelta:pm?e.effPct-pm.effPct:null,totalDelta:pm?e.total-pm.total:null,dayDelta:yd?e.total-yd.total:null}})
}

  let hasPm=!!pm, hasYd=!!yd;
  document.getElementById('compare').innerHTML=`<div class="card pad"><h2>📈 So sánh data</h2><p class="muted">So sánh theo nhân viên giữa dữ liệu hiện tại, hôm qua và cùng kỳ tháng trước. Mỗi lần bấm <b>Lưu & chạy lại</b>, tool tự lưu snapshot theo ngày dữ liệu.</p><div class="grid g4"><div class="kpi"><small>Tháng hiện tại</small><b>${month}</b><small>Ngày ${String(day).padStart(2,'0')}</small></div><div class="kpi"><small>Cùng kỳ tháng trước</small><b>${prevMonth}</b><small>${hasPm?'Có dữ liệu ngày '+String(pm.day).padStart(2,'0'):'Chưa có dữ liệu'}</small></div><div class="kpi"><small>Hôm qua</small><b>${hasYd?'Có':'Chưa có'}</b><small>${hasYd?'Ngày '+String(yd.day).padStart(2,'0'):'Cần lưu snapshot ngày trước'}</small></div><div class="kpi"><small>Số snapshot tháng này</small><b>${Object.keys(getDB().months?.[month]?.snapshots||{}).length}</b></div></div></div><div class="card pad" style="margin-top:14px"><h2>Nhân viên so với cùng kỳ</h2><div class="table-wrap"><table><thead><tr><th>Nhân viên</th><th>Chuỗi</th><th class="num">DTQĐ hiện tại</th><th class="num">DTQĐ cùng kỳ</th><th class="num">+/- DT</th><th class="num">+/- DT%</th><th class="num">HQ hiện tại</th><th class="num">HQ cùng kỳ</th><th class="num">+/- HQ</th><th class="num">Điểm</th><th class="num">+/- điểm CK</th><th class="num">+/- hôm qua</th></tr></thead><tbody>${rows.map(r=>`<tr><td><b>${r.e.name}</b><br><small class="muted">${r.e.id} • ${shortStoreName(r.e.store)}</small></td><td>${r.e.chain}</td><td class="num"><b>${f(r.e.dtqd,2)}</b></td><td class="num">${r.pm?f(r.pm.dtqd,2):'<span class="muted">-</span>'}</td><td class="num">${deltaCell(r.dtDelta,2)}</td><td class="num">${deltaCell(r.dtDeltaPct,1,'%')}</td><td class="num">${p(r.e.effPct,1)}</td><td class="num">${r.pm?p(r.pm.effPct,1):'<span class="muted">-</span>'}</td><td class="num">${deltaCell(r.effDelta,1,'%')}</td><td class="num"><b>${f(r.e.total,1)}</b></td><td class="num">${deltaCell(r.totalDelta,1)}</td><td class="num">${deltaCell(r.dayDelta,1)}</td></tr>`).join('')}</tbody></table></div></div>`
}

0%;margin-top:8px"><button class="btn blue" style="margin-top:8px" onclick="changeRolePin('ql')">Lưu mật khẩu QLY</button></div></div><button class="btn red" style="margin-top:12px" onclick="resetRolePins()">Reset mật khẩu mặc định</button></div>`:''}<div class="grid g2" style="margin-top:14px"><div class="card pad"><h2>Ẩn/hiện tab quyền QLY</h2>${renderTabConfig('ql')}</div><div class="card pad"><h2>Ẩn/hiện tab quyền Admin</h2>${renderTabConfig('admin')}</div></div><div class="card pad" style="margin-top:14px"><h2>Phiên bản dữ liệu theo tháng</h2><div class="grid g3"><div class="kpi"><small>Tháng đang xem</small><b>${getMonthKey()}</b></div><div class="kpi"><small>Số tháng đã lưu</small><b>${months.length}</b></div><div class="kpi"><small>Snapshot tháng này</small><b>${Object.keys(db.months?.[getMonthKey()]?.snapshots||{}).length}</b></div></div><div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Tháng</th><th class="num">Số snapshot</th><th>Cập nhật cuối</th></tr></thead><tbody>${months.map(m=>`<tr><td><b>${m}</b></td><td class="num">${Object.keys(db.months[m].snapshots||{}).length}</td><td>${db.months[m].updatedAt?new Date(db.months[m].updatedAt).toLocaleString('vi-VN'):'-'}</td></tr>`).join('')}</tbody></table></div><div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" onclick="backupAll()">Backup toàn bộ</button><label class="btn blue">Restore <input type="file" accept=".json" onchange="restoreAll(event)" style="display:none"></label><button class="btn red" onclick="if(confirm('Xóa toàn bộ dữ liệu lịch sử?')){localStorage.removeItem(TD_DB_KEY);renderAll()}">Xóa lịch sử</button></div></div>`}

const TD_SESSION_ROLE_KEY='td_v6_session_role';
// Bỏ quyền lưu cũ để mỗi lần mở file phải đăng nhập lại theo đúng mật khẩu nhập vào.
try{ localStorage.removeItem(TD_ROLE_KEY); }catch(e){}

getRole=function(){return sessionStorage.getItem(TD_SESSION_ROLE_KEY)||''}
function isLoggedIn(){return !!getRole()}

visibleNav=function(){
  const role=getRole();
  if(!role) return [['settings','🔐 Đăng nhập']];
  let cfg=getRoleCfg();
  let allowed=cfg[role]||DEFAULT_ROLE_CFG[role]||DEFAULT_ROLE_CFG.ql;
  // Chỉ Admin được thấy Cài đặt. QLY không được thấy tab này dù config cũ có lưu.
  if(role!=='admin') allowed=allowed.filter(x=>x!=='settings' && x!=='import');
  return NAV.filter(n=>allowed.includes(n[0]) || (role==='admin' && n[0]==='settings'));
}

loginRole=function(role){
  const pin=document.getElementById('pin_'+role)?.value||'';
  const hashes=getPinHash();
  if(hashPin(pin)!==(hashes[role]>>>0)){toast('Sai mật khẩu '+ROLE_LABEL[role]);return}
  sessionStorage.setItem(TD_SESSION_ROLE_KEY,role);
  STATE.active='dashboard';
  renderAll();
  toast('Đã đăng nhập quyền '+ROLE_LABEL[role]);
}

logoutRole=function(){
  sessionStorage.removeItem(TD_SESSION_ROLE_KEY);
  STATE.active='settings';
  renderAll();
  toast('Đã đăng xuất');
}

function updateRoleBar(){
  const actions=document.querySelector('.top .actions');
  if(!actions) return;
  let bar=document.getElementById('roleBar');
  if(!bar){
    bar=document.createElement('span');
    bar.id='roleBar';
    bar.style.display='inline-flex';
    bar.style.gap='8px';
    bar.style.alignItems='center';
    actions.insertBefore(bar,actions.firstChild);
  }
  const role=getRole();
  if(!role){
    bar.innerHTML=`<span class="role-chip">🔐 Chưa đăng nhập</span>`;
  }else{
    const cls=role==='admin'?'admin':'ql';
    bar.innerHTML=`<span class="role-chip ${cls}">🔓 Quyền: ${ROLE_LABEL[role]}</span><button class="btn red logout-mini" onclick="logoutRole()">Đăng xuất</button>`;
  }
}

renderNav=function(){
  const nav=visibleNav();
  if(!isLoggedIn()) STATE.active='settings';
  if(isLoggedIn() && !nav.find(n=>n[0]===STATE.active)) STATE.active=nav[0]?.[0]||'dashboard';
  document.getElementById('nav').innerHTML=nav.map(n=>`<button class="${n[0]===STATE.active?'active':''}" onclick="show('${n[0]}')">${n[1]}</button>`).join('') + (isLoggedIn()?`<div class="group">Quyền: ${ROLE_LABEL[getRole()]}</div><button onclick="logoutRole()">🚪 Đăng xuất</button>`:`<div class="nav-login-note">Nhập mật khẩu Admin hoặc QLY để vào tool.</div>`);
  updateRoleBar();
}

show=function(id){
  const nav=visibleNav();
  if(!isLoggedIn()) id='settings';
  else if(!nav.find(n=>n[0]===id)) id=nav[0]?.[0]||'dashboard';
  STATE.active=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
  renderNav();
  if(id==='detailEmp')renderDetail();
  if(id==='compare')renderCompare();
  if(id==='settings')renderSettings();
}

renderTabConfig=function(role){
  if(getRole()!=='admin') return `<div class="admin-only-note">Chỉ Admin mới được ẩn/hiện tab.</div>`;
  let cfg=getRoleCfg();
  let allowed=new Set(cfg[role]||[]);
  const canCheck=(tab)=> role==='admin' ? true : !['settings','import'].includes(tab);
  return `<div id="tabcfg_${role}" class="checkgrid">${NAV.map(n=>{
    const locked=(role==='admin' && n[0]==='settings') || !canCheck(n[0]);
    const checked=(role==='admin' && n[0]==='settings') || (allowed.has(n[0]) && canCheck(n[0]));
    return `<label><input type="checkbox" value="${n[0]}" ${checked?'checked':''} ${locked?'disabled':''}> ${n[1]} ${locked&&role==='ql'?'<small class="muted">(Admin only)</small>':''}</label>`;
  }).join('')}</div><button class="btn primary" onclick="saveRoleTabs('${role}')">Lưu tab cho ${ROLE_LABEL[role]}</button>`;
}

saveRoleTabs=function(role){
  if(getRole()!=='admin'){toast('Chỉ Admin được ẩn/hiện tab');return}
  let cfg=getRoleCfg();
  let list=[...document.querySelectorAll(`#tabcfg_${role} input:checked`)].map(i=>i.value);
  if(role==='admin' && !list.includes('settings')) list.push('settings');
  if(role==='ql') list=list.filter(x=>!['settings','import'].includes(x));
  cfg[role]=list;
  setRoleCfg(cfg);
  renderAll();
  toast('Đã lưu cấu hình tab cho '+ROLE_LABEL[role]);
}

<script>

   - Wrong password cannot enter

(function(){
  function byId(id){return document.getElementById(id)}
  window.loginBySinglePin=function(){
    const pin=(byId('single_pin')?.value||'').trim();
    const hashes=getPinHash();
    let role=null;
    if(hashPin(pin)===(hashes.admin>>>0)) role='admin';
    else if(hashPin(pin)===(hashes.ql>>>0)) role='ql';
    if(!role){
      toast('Sai mật khẩu. Không thể vào tool.');
      const input=byId('single_pin');
      if(input){input.value=''; input.focus(); input.style.borderColor='#ef4444'; setTimeout(()=>input.style.borderColor='',900)}

    }
    sessionStorage.setItem(TD_SESSION_ROLE_KEY,role);
    STATE.active='dashboard';
    renderAll();
    toast('Đã đăng nhập quyền '+ROLE_LABEL[role]);
  };

  // Replace login page with one input only.
  const oldRenderSettings=window.renderSettings;
  window.renderSettings=function(){
    const el=byId('settings');
    if(!el) return;
    const role=getRole();
    const db=getDB();
    const months=Object.keys(db.months||{}).sort().reverse();
    if(!role){
      el.innerHTML=`
      <div class="login-wall">
        <div class="login-card" style="max-width:620px">
          <div class="login-title">
            <div class="ico">🔐</div>
            <div>
              <h1>Topzone Đà Nẵng</h1>
              <p>Hệ thống Quản lý Thi đua & KPI</p>
            </div>
          </div>
          <div class="login-box">
            <h2>Nhập mật khẩu</h2>
            <p class="muted">Sai mật khẩu sẽ không vào được tool.</p>
            <input id="single_pin" class="btn" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" autofocus onkeydown="if(event.key==='Enter')loginBySinglePin()">
            <button class="btn primary" onclick="loginBySinglePin()">Vào tool</button>
          </div>
        </div>
      </div>`;
      setTimeout(()=>byId('single_pin')?.focus(),50);
      return;
    }
    if(role!=='admin'){
      el.innerHTML=`<div class="card pad"><h2>🔒 Cài đặt bị khóa</h2><p class="muted">Bạn đang ở quyền <b>${ROLE_LABEL[role]}</b>. Chỉ Admin mới có quyền Cài đặt, đổi mật khẩu và ẩn/hiện tab.</p><button class="btn red" onclick="logoutRole()">Đăng xuất</button></div>`;
      return;
    }
    el.innerHTML=`<div class="card pad"><h2>⚙️ Cài đặt & phân quyền</h2><p class="muted">Quyền hiện tại: <b>Admin</b>. Chỉ Admin được ẩn/hiện tab và đổi mật khẩu.</p></div><div class="card pad" style="margin-top:14px"><h2>🔐 Đổi mật khẩu</h2><p class="muted">Mật khẩu mới lưu trên trình duyệt của máy đang dùng.</p><div class="grid g2"><div class="kpi"><small>Đổi mật khẩu Admin</small><input id="newpin_admin" class="btn" type="password" placeholder="Mật khẩu Admin mới" autocomplete="new-password" style="width:100%;margin-top:8px"><input id="newpin2_admin" class="btn" type="password" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password" style="width:100%;margin-top:8px"><button class="btn primary" style="margin-top:8px" onclick="changeRolePin('admin')">Lưu mật khẩu Admin</button></div><div class="kpi"><small>Đổi mật khẩu QLY</small><input id="newpin_ql" class="btn" type="password" placeholder="Mật khẩu QLY mới" autocomplete="new-password" style="width:100%;margin-top:8px"><input id="newpin2_ql" class="btn" type="password" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password" style="width:100%;margin-top:8px"><button class="btn blue" style="margin-top:8px" onclick="changeRolePin('ql')">Lưu mật khẩu QLY</button></div></div><button class="btn red" style="margin-top:12px" onclick="resetRolePins()">Reset mật khẩu mặc định</button></div><div class="grid g2" style="margin-top:14px"><div class="card pad"><h2>Ẩn/hiện tab quyền QLY</h2>${renderTabConfig('ql')}</div><div class="card pad"><h2>Ẩn/hiện tab quyền Admin</h2>${renderTabConfig('admin')}</div></div><div class="card pad" style="margin-top:14px"><h2>Phiên bản dữ liệu theo tháng</h2><div class="grid g3"><div class="kpi"><small>Tháng đang xem</small><b>${getMonthKey()}</b></div><div class="kpi"><small>Số tháng đã lưu</small><b>${months.length}</b></div><div class="kpi"><small>Snapshot tháng này</small><b>${Object.keys(db.months?.[getMonthKey()]?.snapshots||{}).length}</b></div></div><div class="table-wrap" style="margin-top:12px"><table><thead><tr><th>Tháng</th><th class="num">Số snapshot</th><th>Cập nhật cuối</th></tr></thead><tbody>${months.map(m=>`<tr><td><b>${m}</b></td><td class="num">${Object.keys(db.months[m].snapshots||{}).length}</td><td>${db.months[m].updatedAt?new Date(db.months[m].updatedAt).toLocaleString('vi-VN'):'-'}</td></tr>`).join('')}</tbody></table></div><div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" onclick="backupAll()">Backup toàn bộ</button><label class="btn blue">Restore <input type="file" accept=".json" onchange="restoreAll(event)" style="display:none"></label><button class="btn red" onclick="if(confirm('Xóa toàn bộ dữ liệu lịch sử?')){localStorage.removeItem(TD_DB_KEY);renderAll()}">Xóa lịch sử</button></div></div>`;
  };

  // Make sure menu does not show normal tabs until logged in.
  const oldRenderNav=window.renderNav;
  window.renderNav=function(){
    const nav=visibleNav();
    const navEl=byId('nav');
    if(!navEl) return;
    navEl.innerHTML=nav.map(n=>`<button class="${n[0]===STATE.active?'active':''}" onclick="show('${n[0]}')">${n[1]}</button>`).join('') + (isLoggedIn()?`<div class="group">Quyền: ${ROLE_LABEL[getRole()]}</div><button onclick="logoutRole()">🚪 Đăng xuất</button>`:`<div class="nav-login-note">Nhập mật khẩu để vào tool.</div>`);
  };

  // Re-render with new login UI after this override loads.
  if(typeof renderAll==='function') renderAll();
})();
</script>


<script>
/* V6.4 QLY Import Permission Patch
   - QLY can access Import dữ liệu.
   - Only Admin can access Settings and hide/show tabs.
   - Admin can still hide Import for QLY from Settings if needed.
*/
(function(){
  const MIG_KEY='td_v6_migrate_ql_import_v1';
  try{
    if(!localStorage.getItem(MIG_KEY)){
      const cfg=getRoleCfg();
      cfg.ql=Array.from(new Set([...(cfg.ql||[]),'import']));
      cfg.ql=cfg.ql.filter(x=>x!=='settings');
      setRoleCfg(cfg);
      localStorage.setItem(MIG_KEY,'1');
    }
  }catch(e){}

  window.visibleNav=function(){
    const role=getRole();
    if(!role) return [['settings','🔐 Đăng nhập']];
    const cfg=getRoleCfg();
    let allowed=[...(cfg[role]||DEFAULT_ROLE_CFG[role]||DEFAULT_ROLE_CFG.ql||[])];
    if(role!=='admin') allowed=allowed.filter(x=>x!=='settings');
    return NAV.filter(n=>allowed.includes(n[0]) || (role==='admin' && n[0]==='settings'));
  };

  window.renderTabConfig=function(role){
    if(getRole()!=='admin') return `<div class="admin-only-note">Chỉ Admin mới được ẩn/hiện tab.</div>`;
    const cfg=getRoleCfg();
    const allowed=new Set(cfg[role]||[]);
    return `<div id="tabcfg_${role}" class="checkgrid">${NAV.map(n=>{
      const isSettings=n[0]==='settings';
      const locked=(role==='admin' && isSettings) || (role==='ql' && isSettings);
      const checked=(role==='admin' && isSettings) || (allowed.has(n[0]) && !(role==='ql' && isSettings));
      return `<label><input type="checkbox" value="${n[0]}" ${checked?'checked':''} ${locked?'disabled':''}> ${n[1]} ${role==='ql'&&isSettings?'<small class="muted">(Admin only)</small>':''}</label>`;
    }).join('')}</div><button class="btn primary" onclick="saveRoleTabs('${role}')">Lưu tab cho ${ROLE_LABEL[role]}</button>`;
  };

  window.saveRoleTabs=function(role){
    if(getRole()!=='admin'){toast('Chỉ Admin được ẩn/hiện tab');return}
    const cfg=getRoleCfg();
    let list=[...document.querySelectorAll(`#tabcfg_${role} input:checked`)].map(i=>i.value);
    if(role==='admin' && !list.includes('settings')) list.push('settings');
    if(role==='ql') list=list.filter(x=>x!=='settings');
    cfg[role]=Array.from(new Set(list));
    setRoleCfg(cfg);
    renderAll();
    toast('Đã lưu cấu hình tab cho '+ROLE_LABEL[role]);
  };

  // Make top menu refresh immediately after patch.
  if(typeof renderAll==='function') renderAll();
})();
</script>
